name: "Run CI"
description: "Sets up Node, restores cached node_modules, and runs one CI command (lint, build, or test)."

inputs:
  node-version:
    description: "Node.js version to set up"
    required: true
  command:
    # GitHub composite-action inputs have no native enum/allowed-values schema,
    # so the allowed set is enforced by the "Validate command" step below.
    description: "Which CI command to run. One of: lint | build | test | test:scripts"
    required: true

runs:
  using: "composite"
  steps:
    - name: Validate command
      shell: bash
      env:
        COMMAND: ${{ inputs.command }}
      run: |
        case "$COMMAND" in
          lint|build|test|test:scripts) ;;
          *)
            echo "::error title=Invalid run-ci command::'$COMMAND' is not allowed. Expected one of: lint, build, test, test:scripts."
            exit 1
            ;;
        esac

    - name: Set up Node ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    # Cache key includes the Node major version: node_modules contains the
    # native better-sqlite3 binary (ABI-specific via NODE_MODULE_VERSION), so a
    # cache built on one Node version must never be restored on another.
    - name: Restore node_modules cache
      id: cache
      uses: actions/cache/restore@v4
      with:
        path: node_modules
        key: node-modules-node${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci

    - name: Save node_modules cache
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: node_modules
        key: node-modules-node${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}

    - name: Run ${{ inputs.command }}
      shell: bash
      run: npm run ${{ inputs.command }}
