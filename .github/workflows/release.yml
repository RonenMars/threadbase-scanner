name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: "Run semantic-release (tag + GitHub Release). When false, only the precheck runs."
        type: boolean
        default: false

jobs:
  release-precheck:
    name: Precheck
    runs-on: ubuntu-latest
    permissions:
      # Read-only: the precheck only inspects git history to decide whether a
      # release is warranted. It does not push, publish, or contact npm/OIDC.
      contents: read
    outputs:
      should_release: ${{ steps.precheck.outputs.should_release }}
      next_version: ${{ steps.precheck.outputs.next_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Decide whether a release is needed
        id: precheck
        # Deliberately NOT `semantic-release --dry-run`: that loads every plugin
        # and runs their verifyConditions first, and @semantic-release/npm's
        # verifyConditions performs the npm OIDC token exchange even in dry-run.
        # That would couple this read-only decision to publish credentials and
        # force `id-token: write` onto a job that publishes nothing.
        #
        # release-precheck.mjs calls ONLY @semantic-release/commit-analyzer with
        # the same rules from .releaserc.json — no publishing plugins, no npm or
        # OIDC auth. It writes should_release/next_version to $GITHUB_OUTPUT.
        run: node scripts/release-precheck.mjs

  release:
    name: Release
    needs: release-precheck
    if: |
      needs.release-precheck.outputs.should_release == 'true' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == true))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Notify streamer
        if: success()
        env:
          GH_TOKEN: ${{ secrets.STREAMER_DISPATCH_PAT }}
        run: |
          gh api -X POST repos/RonenMars/threadbase-streamer/dispatches \
            -f event_type=scanner-released
